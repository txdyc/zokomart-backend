spring:
  datasource:
    url: jdbc:h2:mem:zokomart;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never
  data:
    redis:
      repositories:
        enabled: false
    elasticsearch:
      repositories:
        enabled: false
  flyway:
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

zokomart:
  storage:
    root-path: target/test-uploads
    public-base-path: /public/uploads
  admin:
    bootstrap:
      enabled: true
      username: platform.root
      display-name: Platform Root
      password: Passw0rd!
