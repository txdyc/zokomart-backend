spring:
  datasource:
    url: jdbc:h2:mem:zokomart;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never
  data:
    redis:
      repositories:
        enabled: false
    elasticsearch:
      repositories:
        enabled: false
  flyway:
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

zokomart:
  storage:
    root-path: target/test-uploads
    public-base-path: /public/uploads
  buyer:
    bootstrap:
      enabled: true
      buyer-id: 00000000-0000-0000-0000-000000000101
      phone-number: +233 24 567 8901
      password: Passw0rd!
  admin:
    bootstrap:
      enabled: true
      username: platform.root
      display-name: Platform Root
      password: Passw0rd!
  category-stats:
    sync-interval: PT1H
